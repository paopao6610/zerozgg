<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FF Diamond Pro Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#1a1a1a,#000);
  color:white;
  text-align:center;
}

.header{
  padding:25px;
  font-size:28px;
  font-weight:bold;
  background: linear-gradient(90deg,#ff0000,#ff7300);
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}

.card{
  background:#222;
  width:200px;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(255,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.price{
  color:gold;
  margin-top:5px;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#ff3b3b;
  color:white;
  font-size:15px;
}

.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.form{
  background:#111;
  padding:20px;
  border-radius:12px;
  width:280px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

.send{
  background:limegreen;
}
</style>
</head>

<body>

<div class="header">🔥 FREE FIRE DIAMOND PRO SHOP 🔥</div>

<div class="grid">

  <div class="card">
    💎 100 เพชร
    <div class="price">30 บาท</div>
    <button onclick="openForm(100,30)">สั่งซื้อ</button>
  </div>

  <div class="card">
    💎 310 เพชร
    <div class="price">90 บาท</div>
    <button onclick="openForm(310,90)">สั่งซื้อ</button>
  </div>

  <div class="card">
    💎 520 เพชร
    <div class="price">150 บาท</div>
    <button onclick="openForm(520,150)">สั่งซื้อ</button>
  </div>

</div>

<!-- ฟอร์ม -->
<div class="popup" id="popup">
  <div class="form">
    <h3>📩 สั่งซื้อ</h3>

    <input id="id" placeholder="Free Fire ID">
    <input id="name" placeholder="ชื่อ">

    <button class="send" onclick="send()">ส่งออเดอร์</button>
    <button onclick="closeForm()">ปิด</button>
  </div>
</div>

<script>
let selectedDiamond = 0;
let selectedPrice = 0;

function openForm(d,p){
  selectedDiamond = d;
  selectedPrice = p;
  document.getElementById("popup").style.display="flex";
}

function closeForm(){
  document.getElementById("popup").style.display="none";
}

function send(){
  let id = document.getElementById("id").value;
  let name = document.getElementById("name").value;

  if(!id || !name){
    alert("กรอกข้อมูลให้ครบ!");
    return;
  }

  // 🔥 ส่งเข้า LINE (เปลี่ยนลิงก์ webhook ได้)
  let msg =
  "🔥 ออเดอร์ใหม่\\n" +
  "ID: " + id + "\\n" +
  "ชื่อ: " + name + "\\n" +
  "เพชร: " + selectedDiamond + "\\n" +
  "ราคา: " + selectedPrice + " บาท";

  let url = "https://line.me/R/msg/text/?" + encodeURIComponent(msg);

  window.open(url);

  alert("ส่งออเดอร์แล้ว!");
  closeForm();
}
</script>

</body>
</html>
